<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maria Clara ❤️</title>

<style>
body { margin:0; font-family:sans-serif; background:black; color:white; }

/* HEADER */
header {
  padding:40px;
  text-align:center;
  font-size:2em;
  background:pink;
}

/* MENU */
.menu { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; padding:20px; }
.card { background:white; color:black; padding:20px; border-radius:10px; text-align:center; }

/* PAGES */
.page { display:none; min-height:100vh; padding:20px; text-align:center; position:relative; overflow:hidden; }
.active { display:block; }

/* GALERIA */
.galeria img { width:120px; border-radius:10px; }

/* CARTA */
.carta-box { display:none; background:white; color:black; padding:10px; border-radius:10px; }

/* HEART CORRIGIDO */
.heart {
  position: fixed;
  top: -20px;
  font-size: 20px;
  animation: cair linear forwards;
}
@keyframes cair {
  0% { transform: translateY(0); opacity:1; }
  100% { transform: translateY(110vh); opacity:0; }
}

/* RAPUNZEL (NÃO MUDEI FUNDO) */
.lanterna {
  position:absolute;
  bottom:-50px;
  width:20px;
  height:30px;
  background:radial-gradient(circle,#ffd700,#ffae00);
  border-radius:5px;
  box-shadow:0 0 20px #ffd700;
  animation:subir linear forwards;
}
@keyframes subir {
  to { transform:translateY(-110vh); opacity:0; }
}

/* HOMEM ARANHA */
.cidade {
  position:absolute;
  bottom:0;
  width:100%;
  height:220px;
  background:repeating-linear-gradient(to right,#111 0,#111 30px,#000 30px,#000 60px);
}

.spider-real {
  position:absolute;
  top:0;
  left:20px;
  font-size:45px;
  transform-origin:top;
  animation:balanco 2s infinite;
}
@keyframes balanco {
  0%{transform:rotate(15deg);}
  50%{transform:rotate(-15deg);}
  100%{transform:rotate(15deg);}
}

/* TEIA COMPLETA */
.teia {
  position:absolute;
  width:120px;
  height:120px;
  border:2px solid white;
  border-radius:50%;
  animation:abrir 0.2s ease;
}
@keyframes abrir {
  from { transform:scale(0); opacity:0; }
  to { transform:scale(1); opacity:1; }
}
.teia::before,
.teia::after {
  content:"";
  position:absolute;
  background:white;
}
.teia::before { width:2px; height:100%; left:50%; }
.teia::after { height:2px; width:100%; top:50%; }

</style>
</head>

<body>

<header id="headerPrincipal">Você é meu mundo 💖</header>

<div id="menu" class="menu">
  <div class="card" onclick="showPage('rapunzel')">✨ Rapunzel</div>
  <div class="card" onclick="showPage('spiderman')">🕷️ Homem-Aranha</div>
  <div class="card" onclick="showPage('carta')">💌 Carta</div>
</div>

<!-- RAPUNZEL -->
<div id="rapunzel" class="page" onclick="criarLanterna()">
  <h1>Você ilumina minha vida ✨</h1>
  <div class="galeria">
    <img src="foto1.jpg"><img src="foto1b.jpg">
  </div>
  <button onclick="back()">Voltar</button>
</div>

<!-- SPIDERMAN -->
<div id="spiderman" class="page" onclick="soltarTeia(event)">
  <div class="spider-real">🕷️</div>
  <div class="cidade"></div>

  <h1>Minha heroína ❤️</h1>
  <div class="galeria">
    <img src="foto2.jpg"><img src="foto2b.jpg">
  </div>

  <button onclick="back()">Voltar</button>
</div>

<!-- CARTA -->
<div id="carta" class="page">
  <h1>💌</h1>
  <div onclick="toggleCarta()">Abrir</div>
  <div id="conteudoCarta" class="carta-box">Eu te amo ❤️</div>
  <button onclick="back()">Voltar</button>
</div>

<script>
let paginaAtual="menu";

function showPage(id){
  paginaAtual=id;
  document.getElementById("menu").style.display="none";
  document.getElementById("headerPrincipal").style.display="none";
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function back(){
  paginaAtual="menu";
  document.getElementById("menu").style.display="grid";
  document.getElementById("headerPrincipal").style.display="block";
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
}

function vibrar(){
  if(navigator.vibrate) navigator.vibrate(200);
}

/* CARTA */
function toggleCarta(){
  const c=document.getElementById("conteudoCarta");
  c.style.display=c.style.display==="block"?"none":"block";
  vibrar();
}

/* LANTERNAS */
function criarLanterna(){
  const page=document.getElementById("rapunzel");

  for(let i=0;i<4;i++){
    const l=document.createElement("div");
    l.className="lanterna";
    l.style.left=Math.random()*100+"vw";
    l.style.animationDuration=(Math.random()*3+4)+"s";
    page.appendChild(l);
    setTimeout(()=>l.remove(),7000);
  }
}

setInterval(()=>{
  if(paginaAtual==="rapunzel"){
    criarLanterna();
  }
},1200);

/* TEIA */
function soltarTeia(e){
  const t=document.createElement("div");
  t.className="teia";

  t.style.left=(e.clientX-60)+"px";
  t.style.top=(e.clientY-60)+"px";

  document.getElementById("spiderman").appendChild(t);

  vibrar();

  setTimeout(()=>t.remove(),1200);
}

/* CORAÇÕES CORRETOS */
setInterval(()=>{
  if(paginaAtual==="menu" || paginaAtual==="carta"){
    const h=document.createElement("div");
    h.className="heart";
    h.innerHTML="❤️";
    h.style.left=Math.random()*100+"vw";
    h.style.animationDuration=(Math.random()*3+2)+"s";
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),5000);
  }
},300);

</script>

</body>
</html>
